<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảy Gao</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#0f172a;
            overflow:hidden;
            font-family:Arial, Helvetica, sans-serif;
        }

        h1{
            font-size:90px;
            color:#00e5ff;
            text-shadow:
                0 0 10px #00e5ff,
                0 0 20px #00e5ff,
                0 0 40px #00e5ff,
                0 0 80px #00e5ff;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow{
            from{
                transform:scale(1);
                text-shadow:
                    0 0 10px #00e5ff,
                    0 0 20px #00e5ff,
                    0 0 40px #00e5ff;
            }
            to{
                transform:scale(1.08);
                text-shadow:
                    0 0 20px #00e5ff,
                    0 0 40px #00e5ff,
                    0 0 80px #00e5ff,
                    0 0 120px #00e5ff;
            }
        }
    </style>
</head>
<body>

<h1>Bảy Gao</h1>

</body>
</html>
